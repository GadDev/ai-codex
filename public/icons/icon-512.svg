<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background (full bleed for maskable — safe zone is inner 80%) -->
  <rect width="512" height="512" fill="#1c1917"/>
  <!-- Notebook body -->
  <rect x="138" y="100" width="256" height="312" rx="20" fill="#2c2722"/>
  <!-- Spine -->
  <rect x="138" y="100" width="44" height="312" rx="10" fill="#c07840"/>
  <!-- Ruled lines -->
  <line x1="220" y1="192" x2="360" y2="192" stroke="#9b9389" stroke-width="8" stroke-linecap="round"/>
  <line x1="220" y1="232" x2="360" y2="232" stroke="#9b9389" stroke-width="8" stroke-linecap="round"/>
  <line x1="220" y1="272" x2="360" y2="272" stroke="#9b9389" stroke-width="8" stroke-linecap="round"/>
  <line x1="220" y1="312" x2="310" y2="312" stroke="#9b9389" stroke-width="8" stroke-linecap="round"/>
  <!-- Bookmark ribbon -->
  <polygon points="328,100 360,100 360,168 344,150 328,168" fill="#c07840"/>
</svg>
